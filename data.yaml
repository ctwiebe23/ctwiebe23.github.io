projects:

  - name: Ellipsi
    featured: true
    type:
      lib: true
    tagline: Simple HTML tag assembler
    thumbnail: /images/400x400_ellipsi.jpg
    lang:
      - lang: JavaScript
    links:
      - href: /ellipsi
        show: README
      - href: https://github.com/ctwiebe23/ellipsi
        show: Repo
    desc: |
      A simple JavaScript library used to create HTML tags programmatically,
      without having to resort to a framework.

  - name: formul8
    featured: false
    type:
      lib: true
    tagline: Automatic form handling
    lang:
      - lang: JavaScript
    links:
      - href: /formul8
        show: README
      - href: https://github.com/ctwiebe23/formul8
        show: Repo
    desc: |
      JavaScript library that takes an HTML form and returns a JSON object that
      contains the live state of the form, as well as an event that fires each
      time the form changes.  Can also be bidirectional; changing the object
      changes the form.

  - name: kera
    featured: true
    type:
      cli: true
    tagline: Fill template files
    lang:
      - lang: Python
    links:
      - href: /kera
        show: README
      - href: https://github.com/ctwiebe23/kera
        show: Repo
    desc: |
      Command line program that combines template files and structured data to
      produce filled templates.  It built the page you're looking at right now!

  - name: M-DOT
    featured: true
    type:
      hardware: true
    tagline: Maze-navigating robot car
    lang:
      - lang: C++
    links:
      - href: https://github.com/ctwiebe23/m-dot
        show: Repo
      - href: /m-dot/out.pdf
        show: Report
    desc: |
      Robot car built using an Arduino UNO, hobby motors, an ultrasonic sensor,
      and an IR receiver.  Does not use any Arduino libraries — rather, it is
      programmed using a custom library that directly manipulates the ATmega328P
      registers.

  - name: SATVIZ
    featured: true
    type:
      web: true
    tagline: Visualizer for <a href="http://minisat.se/">MiniSAT</a>
    lang:
      - lang: PHP
      - lang: CSS
      - lang: JavaScript
      - lang: Java
      - lang: C++
      - lang: SQL
    links:
      - href: https://satviz.unl.edu
        show: satviz.unl.edu
    desc: |
      Website that visualizes the decision path taken by the solver <a
      href="http://minisat.se">MiniSAT</a>. We instrumented MiniSAT to produce
      a log that then generates trails, trees, implication graphs, and more.
      This research project was done for the Constraint Systems Laboratory
      alongside R Scheet.

  - name: corre
    featured: false
    type:
      cli: true
    tagline: Execute shell scripts embedded in text
    lang:
      - lang: Rust
    links:
      - href: /corre
        show: README
      - href: https://github.com/ctwiebe23/corre
        show: Repo
    desc: |
      Command line program that executes shell scripts embedded in text files
      and replaces them with their STDOUT results.  Shell scripts are marked by
      delimiters.

  - name: My Homepage
    featured: false
    type:
      web: true
    tagline: This site right here!
    lang:
      - lang: HTML
      - lang: CSS
      - lang: Python
    links:
      - href: /
        show: cwiebe.com
      - href: https://github.com/ctwiebe23/ctwiebe23.github.io
        show: Repo
    desc: |
      Static webpage hosting some information about me and collecting all my
      links in the same place.  JavaScript-less and generated using
      <a href="/kera">kera</a> and a custom Python SSG.

  - name: WebSocket Perturbation &amp; Response
    featured: false
    type:
      web: true
    tagline: Probe WebSockets
    lang:
      - lang: HTML
      - lang: CSS
      - lang: JavaScript
    links:
      - href: /perturb-and-resp
        show: Link
      - href: https://github.com/ctwiebe23/perturb-and-resp
        show: Repo
    desc: |
      Webform created using
      <a href="https://www.npmjs.com/package/ellipsi">Ellipsi</a> that
      lets you connect to a WebSocket and exchange messages.

  - name: M'TAG
    featured: false
    type:
      cli: true
    tagline: Tag audio files based on filenames
    lang:
      - lang: Clojure
    links:
      - href: https://github.com/ctwiebe23/m-tag
        show: Repo
    desc: |
      Command line program that uses <a
      href="https://github.com/RouHim/jaudiotagger">JAudioTagger</a> to bulk
      re-tag audio files by matching their filenames against patterns using
      regular expressions.

resources:

  - name: pandoc
    href: https://pandoc.org/
    type:
      cli: true
    desc: |
      Extremely powerful program for converting between document types.
      I primarily use it to generate beautiful PDFs and half-decent websites
      from markdown files.

  - name: just
    href: https://github.com/casey/just
    type:
      cli: true
    desc: |
      Allows you to easily shortcut commands, essentially Makefiles for any
      language.

  - name: watchexec
    href: https://github.com/watchexec/watchexec
    type:
      cli: true
    desc: |
      Execute commands when files are changed.  If you've used a
      <code>--watch</code> flag or <code>watch</code> subcommand, this is that
      for <em>every</em> command line interface.

  - name: OBS
    href: https://obsproject.com/
    type:
      desktop: true
    desc: |
      Screen recording and video streaming.  Great for recording slideshow
      presentations.

  - name: Butterick's Practical Typography
    href: https://practicaltypography.com/
    type:
      writing: true
    desc: |
      Web-book about typography and styling text.

  - name: How to Write Mathematics
    href: https://faculty.washington.edu/heagerty/Courses/b572/public/HalmosHowToWrite.pdf
    type:
      writing: true
    desc: |
      Essay on how to write math, how to write technical, and how to write in
      general.

  - name: Learn You a Haskell for Great Good!
    href: https://learnyouahaskell.github.io/chapters.html
    type:
      programming: true
    desc: |
      Very thorough guide to the Haskell language.

  - name: Clojure for the Brave and True
    href: https://www.braveclojure.com/introduction/
    type:
      programming: true
    desc: |
      The only guide to Clojure I could find that made sense to me.
